#########################################################################################
## Server configuration
#########################################################################################
server.address=0.0.0.0
server.port=8080

#########################################################################################
## Firebase Cloud Messaging (FCM) configuration
##
## Environment variables:
##   BISQ_RELAY_FCM_ENABLED - Enable FCM (default: false)
##   BISQ_RELAY_FCM_FIREBASE_CONFIGURATION_FILE - Path to Firebase service account JSON (required when enabled)
##   BISQ_RELAY_FCM_FIREBASE_URL - Firebase database URL (required when enabled)
##   BISQ_RELAY_FCM_DATA_ONLY - Enable sending FCM data-only messages (default: false)
#########################################################################################
fcm.enabled=${BISQ_RELAY_FCM_ENABLED:false}
fcm.firebaseConfigurationFile=${BISQ_RELAY_FCM_FIREBASE_CONFIGURATION_FILE:}
fcm.firebaseUrl=${BISQ_RELAY_FCM_FIREBASE_URL:}
fcm.sendDataOnly=${BISQ_RELAY_FCM_DATA_ONLY:false}

#########################################################################################
## Apple Push Notification service (APNs) configuration
##
## Environment variables:
##   BISQ_RELAY_APNS_BUNDLE_ID - iOS app bundle identifier (required)
##   BISQ_RELAY_APNS_CERTIFICATE_FILE - Path to .p12 certificate file (required)
##   BISQ_RELAY_APNS_CERTIFICATE_PASSWORD_FILE - Path to certificate password file (required)
##   BISQ_RELAY_APNS_USE_SANDBOX - Use sandbox/development environment (default: true)
#########################################################################################
apns.bundleId=${BISQ_RELAY_APNS_BUNDLE_ID:}
apns.certificateFile=${BISQ_RELAY_APNS_CERTIFICATE_FILE:}
apns.certificatePasswordFile=${BISQ_RELAY_APNS_CERTIFICATE_PASSWORD_FILE:}
apns.useSandbox=${BISQ_RELAY_APNS_USE_SANDBOX:true}

#########################################################################################
# CIRCUIT BREAKER CONFIG
#########################################################################################
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.slidingWindowType=TIME_BASED
resilience4j.circuitbreaker.configs.default.slidingWindowSize=600
resilience4j.circuitbreaker.configs.default.minimumNumberOfCalls=5
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.slowCallRateThreshold=50
resilience4j.circuitbreaker.configs.default.slowCallDurationThreshold=3s
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=60s
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=2
# Record transport failures and explicit provider-failure signals as CircuitBreaker failures
# including async wrapper exceptions
resilience4j.circuitbreaker.configs.default.recordExceptions=\
  java.io.IOException,\
  java.util.concurrent.TimeoutException,\
  java.util.concurrent.CompletionException,\
  java.util.concurrent.ExecutionException,\
  bisq.relay.exception.ProviderFailureException
resilience4j.circuitbreaker.instances.apns.baseConfig=default
resilience4j.circuitbreaker.instances.fcm.baseConfig=default

#########################################################################################
# RETRY CONFIG
#########################################################################################
resilience4j.retry.configs.default.maxAttempts=3
resilience4j.retry.configs.default.waitDuration=500ms
resilience4j.retry.configs.default.enableExponentialBackoff=true
resilience4j.retry.configs.default.exponentialBackoffMultiplier=2
resilience4j.retry.configs.default.retryExceptions=\
  java.io.IOException,\
  java.util.concurrent.TimeoutException,\
  java.util.concurrent.CompletionException,\
  java.util.concurrent.ExecutionException
resilience4j.retry.instances.apns.baseConfig=default
resilience4j.retry.instances.fcm.baseConfig=default

#########################################################################################
# TIME LIMITER CONFIG
#########################################################################################
resilience4j.timelimiter.configs.default.timeoutDuration=5s
resilience4j.timelimiter.configs.default.cancelRunningFuture=true
resilience4j.timelimiter.instances.apns.baseConfig=default
resilience4j.timelimiter.instances.fcm.baseConfig=default

#########################################################################################
## Actuator/management configuration
#########################################################################################
management.server.address=0.0.0.0
management.server.port=9400
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=never
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoints.web.base-path=/actuator
management.metrics.tags.app=bisq-relay
management.metrics.tags.service=relay
# HTTP server
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.9,0.95,0.99
management.metrics.distribution.slo.http.server.requests=50ms,100ms,250ms,500ms,1s,2s,5s,10s
# Push latency
management.metrics.distribution.percentiles-histogram.push_latency_seconds=true
management.metrics.distribution.percentiles.push_latency_seconds=0.5,0.9,0.95,0.99
management.metrics.distribution.slo.push_latency_seconds=50ms,100ms,250ms,500ms,1s,2s,5s,10s
